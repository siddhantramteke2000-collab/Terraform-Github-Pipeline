name: Context Pipeline

on:
  workflow_dispatch:
  push:

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Print Workflowname
        run: echo "${{github.workflow}}"
      - name: Print User
        run: echo "${{github.actor}}"
      - name: Print branch
        run: echo "${{github.ref_name}}"
      - name: Print EVENT
        run: echo "${{github.event}}"
      - name: Print SHA
        run: echo "${{github.sha}}"
        
    